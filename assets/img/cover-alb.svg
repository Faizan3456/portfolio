<svg viewBox="0 0 480 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101a22"/>
      <stop offset="100%" stop-color="#0b0d14"/>
    </linearGradient>
    <radialGradient id="glow3" cx="30%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#5ee0c5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5ee0c5" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="480" height="280" fill="url(#bg3)"/>
  <circle cx="180" cy="140" r="160" fill="url(#glow3)"/>

  <!-- load balancer diamond -->
  <g transform="translate(150,120)">
    <rect x="0" y="0" width="40" height="40" transform="rotate(45 20 20)" fill="#0f1119" stroke="#7c9cff" stroke-width="2"/>
    <text x="20" y="25" font-size="14" fill="#7c9cff" text-anchor="middle" font-family="monospace">LB</text>
  </g>

  <!-- connections to 3 servers -->
  <g stroke="url(#lbline)" stroke-width="2" fill="none">
    <path d="M190 130 C 260 90, 300 80, 350 80" stroke="#7c9cff" opacity="0.7" stroke-dasharray="5 6">
      <animate attributeName="stroke-dashoffset" from="0" to="-44" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M190 140 C 260 140, 300 140, 350 140" stroke="#b98cff" opacity="0.7" stroke-dasharray="5 6">
      <animate attributeName="stroke-dashoffset" from="0" to="-44" dur="1.7s" repeatCount="indefinite"/>
    </path>
    <path d="M190 150 C 260 190, 300 200, 350 200" stroke="#5ee0c5" opacity="0.7" stroke-dasharray="5 6">
      <animate attributeName="stroke-dashoffset" from="0" to="-44" dur="2.3s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- three server boxes -->
  <g fill="#151a29" stroke="#2a3040" stroke-width="1.5">
    <rect x="350" y="60" width="54" height="40" rx="6"/>
    <rect x="350" y="120" width="54" height="40" rx="6"/>
    <rect x="350" y="180" width="54" height="40" rx="6"/>
  </g>
  <g fill="#3a4258">
    <rect x="360" y="70" width="34" height="6" rx="2"/>
    <rect x="360" y="130" width="34" height="6" rx="2"/>
    <rect x="360" y="190" width="34" height="6" rx="2"/>
  </g>
  <g fill="#5ee0c5">
    <circle cx="392" cy="90" r="3"/>
    <circle cx="392" cy="150" r="3"/>
    <circle cx="392" cy="210" r="3"/>
  </g>

  <!-- inbound traffic arrow -->
  <path d="M60 130 L145 132" stroke="#7c9cff" stroke-width="2" opacity="0.8" marker-end="url(#arrow)"/>
</svg>
