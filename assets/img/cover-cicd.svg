<svg viewBox="0 0 480 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101f1c"/>
      <stop offset="100%" stop-color="#0b0d14"/>
    </linearGradient>
    <radialGradient id="glow4" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#5ee0c5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5ee0c5" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="480" height="280" fill="url(#bg4)"/>
  <circle cx="240" cy="140" r="150" fill="url(#glow4)"/>

  <!-- circular pipeline -->
  <circle cx="240" cy="140" r="85" fill="none" stroke="#2a3040" stroke-width="3"/>
  <circle cx="240" cy="140" r="85" fill="none" stroke="url(#line1)" stroke-width="3" stroke-dasharray="18 500" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" from="0 240 140" to="360 240 140" dur="4s" repeatCount="indefinite"/>
  </circle>
  <defs>
    <linearGradient id="line1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c9cff"/>
      <stop offset="100%" stop-color="#5ee0c5"/>
    </linearGradient>
  </defs>

  <!-- stage nodes around circle -->
  <g fill="#151a29" stroke="#3a4258" stroke-width="1.5">
    <circle cx="240" cy="55" r="16"/>
    <circle cx="325" cy="140" r="16"/>
    <circle cx="240" cy="225" r="16"/>
    <circle cx="155" cy="140" r="16"/>
  </g>
  <g fill="#7c9cff" font-family="monospace" font-size="10" text-anchor="middle">
    <text x="240" y="59">git</text>
    <text x="325" y="144">test</text>
  </g>
  <g fill="#b98cff" font-family="monospace" font-size="10" text-anchor="middle">
    <text x="240" y="229">build</text>
  </g>
  <g fill="#5ee0c5" font-family="monospace" font-size="9" text-anchor="middle">
    <text x="155" y="144">deploy</text>
  </g>

  <!-- center rocket -->
  <g transform="translate(222,120)">
    <path d="M18 0 C28 10 30 26 24 40 L12 40 C6 26 8 10 18 0 Z" fill="#0f1119" stroke="#5ee0c5" stroke-width="2"/>
    <circle cx="18" cy="16" r="4" fill="#5ee0c5"/>
    <path d="M10 40 L4 50 M26 40 L32 50" stroke="#5ee0c5" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
