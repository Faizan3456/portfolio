<svg viewBox="0 0 480 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#151a29"/>
      <stop offset="100%" stop-color="#0b0d14"/>
    </linearGradient>
    <linearGradient id="line1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c9cff"/>
      <stop offset="100%" stop-color="#5ee0c5"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c9cff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c9cff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="480" height="280" fill="url(#bg1)"/>
  <circle cx="240" cy="140" r="150" fill="url(#glow1)"/>

  <!-- left server rack -->
  <g transform="translate(70,90)">
    <rect x="0" y="0" width="70" height="100" rx="8" fill="#151a29" stroke="#2a3040" stroke-width="1.5"/>
    <rect x="10" y="14" width="50" height="8" rx="2" fill="#7c9cff" opacity="0.8"/>
    <rect x="10" y="30" width="50" height="8" rx="2" fill="#3a4258"/>
    <rect x="10" y="46" width="50" height="8" rx="2" fill="#3a4258"/>
    <rect x="10" y="62" width="34" height="8" rx="2" fill="#5ee0c5" opacity="0.7"/>
    <circle cx="52" cy="80" r="4" fill="#5ee0c5"/>
  </g>

  <!-- right server rack -->
  <g transform="translate(340,90)">
    <rect x="0" y="0" width="70" height="100" rx="8" fill="#151a29" stroke="#2a3040" stroke-width="1.5"/>
    <rect x="10" y="14" width="50" height="8" rx="2" fill="#b98cff" opacity="0.8"/>
    <rect x="10" y="30" width="50" height="8" rx="2" fill="#3a4258"/>
    <rect x="10" y="46" width="50" height="8" rx="2" fill="#3a4258"/>
    <rect x="10" y="62" width="34" height="8" rx="2" fill="#5ee0c5" opacity="0.7"/>
    <circle cx="52" cy="80" r="4" fill="#5ee0c5"/>
  </g>

  <!-- message queue path -->
  <path d="M 145 130 C 210 100, 270 100, 335 130" fill="none" stroke="url(#line1)" stroke-width="2" stroke-dasharray="6 8" opacity="0.8">
    <animate attributeName="stroke-dashoffset" from="0" to="-56" dur="2.4s" repeatCount="indefinite"/>
  </path>
  <path d="M 335 150 C 270 175, 210 175, 145 150" fill="none" stroke="url(#line1)" stroke-width="2" stroke-dasharray="6 8" opacity="0.5">
    <animate attributeName="stroke-dashoffset" from="-56" to="0" dur="2.4s" repeatCount="indefinite"/>
  </path>

  <!-- envelope icon center -->
  <g transform="translate(210,55)">
    <rect x="0" y="0" width="60" height="40" rx="6" fill="#0f1119" stroke="#5ee0c5" stroke-width="2"/>
    <path d="M2 4 L30 26 L58 4" fill="none" stroke="#5ee0c5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
